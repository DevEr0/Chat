
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --honey: #E8A838;
    --honey-light: #FDF3DC;
    --honey-dark: #9B6A10;
    --erick: #4A7CF0;
    --erick-light: #EBF0FD;
    --erick-dark: #1A3F9E;
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --muted: #888;
    --border: rgba(0,0,0,0.08);
    --radius: 18px;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 600px; }

  #screen-select {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 600px; padding: 2rem; text-align: center;
  }
  .select-title {
    font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400;
    color: var(--text); margin-bottom: 8px;
  }
  .select-sub { font-size: 14px; color: var(--muted); margin-bottom: 3rem; }
  .avatars-row { display: flex; gap: 2rem; }
  .avatar-btn {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px;
    padding: 2rem 2.5rem; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .avatar-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
  .avatar-btn.honey:hover { border-color: var(--honey); }
  .avatar-btn.erick:hover { border-color: var(--erick); }
  .avatar-circle {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400;
  }
  .honey .avatar-circle { background: var(--honey-light); color: var(--honey-dark); }
  .erick .avatar-circle { background: var(--erick-light); color: var(--erick-dark); }
  .avatar-name { font-size: 16px; font-weight: 500; }
  .honey .avatar-name { color: var(--honey-dark); }
  .erick .avatar-name { color: var(--erick-dark); }

  #screen-chat { display: none; flex-direction: column; height: 600px; }

  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 400;
  }
  .header-name { font-size: 15px; font-weight: 500; }
  .header-status { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--muted); transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.call-btn { color: #22C55E; border-color: #22C55E30; }
  .icon-btn.call-btn:hover { background: #F0FDF4; }

  .messages-area {
    flex: 1; overflow-y: auto; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg);
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-avatar-sm {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 10px;
  }
  .bubble {
    max-width: 68%; padding: 10px 14px; border-radius: 18px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
    position: relative;
  }
  .bubble.theirs { border-bottom-left-radius: 4px; }
  .bubble.mine { border-bottom-right-radius: 4px; }

  .time-label {
    font-size: 10px; color: var(--muted); text-align: center;
    margin: 4px 0; opacity: 0.7;
  }

  .chat-input-area {
    padding: 12px 18px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 10px;
  }
  .input-wrapper {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 22px; padding: 10px 16px; display: flex; align-items: center;
    transition: border-color 0.15s;
  }
  .input-wrapper:focus-within { border-color: rgba(0,0,0,0.2); }
  #msg-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    resize: none; max-height: 100px; min-height: 20px; line-height: 1.4;
  }
  #msg-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; transition: all 0.15s; flex-shrink: 0;
    background: #ccc; color: white;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }

  .back-btn {
    background: transparent; border: none; cursor: pointer; padding: 4px;
    color: var(--muted); font-size: 18px; display: flex; align-items: center;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }

  .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .day-divider {
    display: flex; align-items: center; gap: 10px; margin: 8px 0;
    font-size: 11px; color: var(--muted);
  }
  .day-divider::before, .day-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .call-overlay {
    display: none; position: absolute; inset: 0; z-index: 100;
    background: #0F0F1A; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; min-height: 600px;
  }
  .call-overlay.active { display: flex; }
  .call-avatar-big {
    width: 90px; height: 90px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 34px;
    box-shadow: 0 0 0 12px rgba(255,255,255,0.06);
  }
  .call-name { font-size: 22px; font-weight: 400; color: #fff; font-family: 'Playfair Display', serif; }
  .call-status { font-size: 13px; color: rgba(255,255,255,0.5); }
  .call-timer { font-size: 32px; font-weight: 300; color: #fff; font-variant-numeric: tabular-nums; }
  .call-actions { display: flex; gap: 20px; margin-top: 1rem; }
  .call-action-btn {
    width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    transition: all 0.15s;
  }
  .call-action-btn:hover { transform: scale(1.06); }
  .end-call-btn { background: #EF4444; color: white; }
  .mute-btn { background: rgba(255,255,255,0.12); color: white; }
  .mute-btn.active { background: rgba(255,255,255,0.3); }

  .notification-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 50;
    padding: 10px 16px; font-size: 13px; font-weight: 500;
    display: none; align-items: center; justify-content: space-between;
    cursor: pointer; animation: slideDown 0.3s ease;
    background: #22C55E; color: white;
  }
  .notification-bar.show { display: flex; }
  @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }

  .wrapper { position: relative; overflow: hidden; }

  .msg-in { animation: msgIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes msgIn { from{opacity:0;transform:translateY(10px) scale(0.95)} to{opacity:1;transform:none} }

  .emoji-bar { display: flex; gap: 6px; padding: 4px 0; }
  .emoji-btn { background: none; border: none; font-size: 20px; cursor: pointer; transition: transform 0.1s; }
  .emoji-btn:hover { transform: scale(1.3); }

  .read-receipt { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
</style>

<div class="wrapper">
  <div id="screen-select">
    <h2 class="select-title">who are you?</h2>
    <p class="select-sub">choose your side to open the chat</p>
    <div class="avatars-row">
      <button class="avatar-btn honey" onclick="enterChat('honey')">
        <div class="avatar-circle">H</div>
        <span class="avatar-name">Honey</span>
      </button>
      <button class="avatar-btn erick" onclick="enterChat('erick')">
        <div class="avatar-circle">E</div>
        <span class="avatar-name">Erick</span>
      </button>
    </div>
  </div>

  <div id="screen-chat">
    <div class="chat-header">
      <div class="header-left">
        <button class="back-btn" onclick="goBack()" aria-label="Back"><i class="ti ti-arrow-left"></i></button>
        <div class="header-avatar" id="h-avatar"></div>
        <div>
          <div class="header-name" id="h-name"></div>
          <div class="header-status" id="h-status">online</div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn call-btn" onclick="startCall()" title="Voice call" aria-label="Start voice call">
          <i class="ti ti-phone"></i>
        </button>
        <button class="icon-btn" onclick="clearChat()" title="Clear chat" aria-label="Clear messages">
          <i class="ti ti-trash"></i>
        </button>
      </div>
    </div>

    <div class="messages-area" id="messages-area">
      <div class="day-divider">today</div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="msg-input" placeholder="write something..." rows="1"
          oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">
        <i class="ti ti-send"></i>
      </button>
    </div>
  </div>

  <div class="call-overlay" id="call-overlay">
    <div class="call-avatar-big" id="call-avatar"></div>
    <div class="call-name" id="call-name"></div>
    <div class="call-status" id="call-status">calling...</div>
    <div class="call-timer" id="call-timer" style="display:none">0:00</div>
    <div class="call-actions">
      <button class="call-action-btn mute-btn" id="mute-btn" onclick="toggleMute()" aria-label="Toggle mute">
        <i class="ti ti-microphone"></i>
      </button>
      <button class="call-action-btn end-call-btn" onclick="endCall()" aria-label="End call">
        <i class="ti ti-phone-off"></i>
      </button>
    </div>
  </div>

  <div class="notification-bar" id="notif-bar" onclick="dismissNotif()">
    <span id="notif-text"></span>
    <span style="font-size:11px;opacity:0.8">tap to dismiss</span>
  </div>
</div>

<script>
const KEY_MSGS = 'hk_msgs_v2';
const KEY_CALL = 'hk_call_v2';

let me = null;
let other = null;
let pollInterval = null;
let callInterval = null;
let callSeconds = 0;
let isMuted = false;
let lastMsgCount = 0;
let callPollInterval = null;

const config = {
  honey: {
    name: 'Honey', initial: 'H',
    bubble: { bg: '#FDF3DC', color: '#7A4F00' },
    send: { bg: '#E8A838', color: '#fff' },
    avatar: { bg: '#FDF3DC', color: '#9B6A10' }
  },
  erick: {
    name: 'Erick', initial: 'E',
    bubble: { bg: '#EBF0FD', color: '#1A3F9E' },
    send: { bg: '#4A7CF0', color: '#fff' },
    avatar: { bg: '#EBF0FD', color: '#1A3F9E' }
  }
};

function getMessages() {
  try {
    const raw = localStorage.getItem(KEY_MSGS);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveMessages(msgs) {
  try { localStorage.setItem(KEY_MSGS, JSON.stringify(msgs)); } catch {}
}

function getCallState() {
  try {
    const raw = localStorage.getItem(KEY_CALL);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveCallState(state) {
  try {
    if (state) localStorage.setItem(KEY_CALL, JSON.stringify(state));
    else localStorage.removeItem(KEY_CALL);
  } catch {}
}

function enterChat(who) {
  me = who;
  other = who === 'honey' ? 'erick' : 'honey';
  const cfg = config[other];
  const meCfg = config[me];

  document.getElementById('screen-select').style.display = 'none';
  const chatScreen = document.getElementById('screen-chat');
  chatScreen.style.display = 'flex';

  const av = document.getElementById('h-avatar');
  av.textContent = cfg.initial;
  av.style.background = cfg.avatar.bg;
  av.style.color = cfg.avatar.color;
  document.getElementById('h-name').textContent = cfg.name;

  const sendBtn = document.getElementById('send-btn');
  sendBtn.style.background = meCfg.send.bg;
  sendBtn.style.color = meCfg.send.color;

  renderMessages();
  pollInterval = setInterval(pollMessages, 800);
  callPollInterval = setInterval(pollCall, 800);
}

function goBack() {
  clearInterval(pollInterval);
  clearInterval(callPollInterval);
  endCall(true);
  document.getElementById('screen-chat').style.display = 'none';
  document.getElementById('screen-select').style.display = 'flex';
  me = null; other = null;
}

function renderMessages() {
  const msgs = getMessages();
  const area = document.getElementById('messages-area');
  
  if (msgs.length === lastMsgCount) return;

  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;
  lastMsgCount = msgs.length;

  area.innerHTML = '<div class="day-divider">today</div>';
  msgs.forEach((msg, i) => {
    const isMine = msg.sender === me;
    const cfg = config[msg.sender];
    const row = document.createElement('div');
    row.className = 'msg-row' + (isMine ? ' mine' : '');
    
    const smAv = document.createElement('div');
    smAv.className = 'msg-avatar-sm';
    smAv.textContent = cfg.initial;
    smAv.style.background = cfg.avatar.bg;
    smAv.style.color = cfg.avatar.color;

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isMine ? 'mine' : 'theirs') + (i === msgs.length - 1 ? ' msg-in' : '');
    bubble.style.background = cfg.bubble.bg;
    bubble.style.color = cfg.bubble.color;
    bubble.textContent = msg.text;

    if (!isMine) row.append(smAv, bubble);
    else row.append(bubble, smAv);

    area.appendChild(row);

    if (isMine && i === msgs.length - 1) {
      const rr = document.createElement('div');
      rr.className = 'read-receipt';
      rr.textContent = msg.read ? '✓✓ seen' : '✓ sent';
      rr.style.color = msg.read ? config[other].send.bg : '#aaa';
      area.appendChild(rr);
    }
  });

  if (wasAtBottom || msgs[msgs.length-1]?.sender === me) {
    area.scrollTop = area.scrollHeight;
  }

  markRead(msgs);
}

function markRead(msgs) {
  let changed = false;
  msgs.forEach(msg => {
    if (msg.sender === other && !msg.read) { msg.read = true; changed = true; }
  });
  if (changed) saveMessages(msgs);
}

function pollMessages() {
  const msgs = getMessages();
  if (msgs.length !== lastMsgCount) {
    const lastMsg = msgs[msgs.length - 1];
    if (lastMsg && lastMsg.sender === other) {
      showNotif(`${config[other].name}: ${lastMsg.text}`);
    }
    renderMessages();
  }
}

function pollCall() {
  const state = getCallState();
  if (!state) return;
  if (state.from === other && state.status === 'calling') {
    showIncomingCall(state);
  }
  if (state.status === 'ended' && callInterval) {
    endCall(true);
  }
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  const msgs = getMessages();
  msgs.push({ sender: me, text, ts: Date.now(), read: false });
  saveMessages(msgs);
  input.value = '';
  autoResize(input);
  renderMessages();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function showNotif(text) {
  const bar = document.getElementById('notif-bar');
  document.getElementById('notif-text').textContent = text;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 3500);
}

function dismissNotif() {
  document.getElementById('notif-bar').classList.remove('show');
}

function clearChat() {
  if (confirm('clear all messages?')) {
    saveMessages([]);
    lastMsgCount = -1;
    renderMessages();
  }
}

function startCall() {
  const overlay = document.getElementById('call-overlay');
  const callAv = document.getElementById('call-avatar');
  const cfg = config[other];
  callAv.textContent = cfg.initial;
  callAv.style.background = cfg.avatar.bg;
  callAv.style.color = cfg.avatar.color;
  callAv.style.border = `3px solid ${config[me].send.bg}`;
  document.getElementById('call-name').textContent = cfg.name;
  document.getElementById('call-status').textContent = 'calling...';
  document.getElementById('call-status').style.display = '';
  document.getElementById('call-timer').style.display = 'none';

  saveCallState({ from: me, to: other, status: 'calling', ts: Date.now() });
  overlay.classList.add('active');

  setTimeout(() => {
    const state = getCallState();
    if (state && state.status === 'calling') {
      state.status = 'connected';
      saveCallState(state);
      startCallTimer();
    }
  }, 2000);
}

function showIncomingCall(state) {
  if (document.getElementById('call-overlay').classList.contains('active')) return;
  const overlay = document.getElementById('call-overlay');
  const cfg = config[other];
  document.getElementById('call-avatar').textContent = cfg.initial;
  document.getElementById('call-avatar').style.background = cfg.avatar.bg;
  document.getElementById('call-avatar').style.color = cfg.avatar.color;
  document.getElementById('call-name').textContent = cfg.name;
  document.getElementById('call-status').textContent = `incoming call from ${cfg.name}...`;
  document.getElementById('call-timer').style.display = 'none';
  overlay.classList.add('active');
  startCallTimer();
}

function startCallTimer() {
  document.getElementById('call-status').style.display = 'none';
  const timerEl = document.getElementById('call-timer');
  timerEl.style.display = '';
  callSeconds = 0;
  callInterval = setInterval(() => {
    callSeconds++;
    const m = Math.floor(callSeconds / 60);
    const s = callSeconds % 60;
    timerEl.textContent = m + ':' + String(s).padStart(2, '0');
  }, 1000);
}

function endCall(silent) {
  clearInterval(callInterval);
  callInterval = null;
  callSeconds = 0;
  document.getElementById('call-overlay').classList.remove('active');
  document.getElementById('call-timer').style.display = 'none';
  document.getElementById('call-status').style.display = '';
  if (!silent) saveCallState(null);
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('active', isMuted);
  btn.innerHTML = isMuted
    ? '<i class="ti ti-microphone-off"></i>'
    : '<i class="ti ti-microphone"></i>';
}
</script>
